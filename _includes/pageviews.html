<div class="pageview-counter">
  <span class="pageview-icon">👁️</span>
  <span class="pageview-count" id="pageview-count">—</span>
  <span class="pageview-label">views</span>
</div>

<!-- GoatCounter tracking script -->
<script data-goatcounter="https://sheshakandula.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

<script>
(function() {
  // Wait for GoatCounter to load and register the pageview
  setTimeout(function() {
    const pageUrl = window.location.pathname;
    const apiUrl = `https://sheshakandula.goatcounter.com/counter/${encodeURIComponent(pageUrl)}.json`;

    fetch(apiUrl)
      .then(response => response.json())
      .then(data => {
        // GoatCounter returns either count or count_unique
        const count = data.count || data.count_unique || 0;
        document.getElementById('pageview-count').textContent = count > 0 ? count : '—';
      })
      .catch(() => {
        // Silently fail and keep the dash
        document.getElementById('pageview-count').textContent = '—';
      });
  }, 1500); // Wait 1.5 seconds for GoatCounter to register the view
})();
</script>
